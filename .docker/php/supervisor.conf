[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
stdout_logfile=/var/log/php-fpm.log
stderr_logfile=/var/log/php-fpm-error.log
user=www-data

; [program:laravel-queue]
; process_name=%(program_name)s_%(process_num)02d
; command=php /var/www/artisan queue:work --tries=3 --timeout=90
; autostart=true
; autorestart=true
; numprocs=2
; redirect_stderr=true
; stdout_logfile=/var/www/storage/logs/queue-worker.log
; stderr_logfile=/var/www/storage/logs/queue-worker-error.log
; user=www-data

[program:laravel-horizon]
process_name=%(program_name)s
command=php /var/www/artisan horizon
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/horizon.log
stderr_logfile=/var/www/storage/logs/horizon-error.log
user=www-data
stopwaitsecs=600

[program:laravel-scheduler]
command=/bin/sh -c "while true; do php /var/www/artisan schedule:run --no-interaction; sleep 60; done"
autostart=true
autorestart=true
stdout_logfile=/var/www/storage/logs/scheduler.log
stderr_logfile=/var/www/storage/logs/scheduler-error.log
user=www-data

[program:laravel-reverb]
process_name=%(program_name)s
command=php /var/www/artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/www/storage/logs/reverb.log
stderr_logfile=/var/www/storage/logs/reverb-error.log
user=www-data
